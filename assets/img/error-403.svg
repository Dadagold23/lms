<svg width="200" height="200" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGlow403" x1="250" y1="50" x2="250" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#991b1b" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="130" y1="90" x2="370" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#090514"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="200" y1="220" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    
    <!-- Shadows & Glows -->
    <filter id="shieldShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#ef4444" flood-opacity="0.25"/>
    </filter>
    <filter id="lockGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient red glow -->
  <circle cx="250" cy="250" r="180" fill="url(#bgGlow403)"/>

  <!-- Glowing Security Shield -->
  <g filter="url(#shieldShadow)">
    <path d="M250,80 L380,120 L380,260 C380,360 250,420 250,420 C250,420 120,360 120,260 L120,120 Z" fill="url(#shieldGrad)" stroke="#ef4444" stroke-width="6" stroke-linejoin="round" />
  </g>

  <!-- Keyhole Backlight Glow -->
  <circle cx="250" cy="265" r="25" fill="#ef4444" opacity="0.3" filter="url(#lockGlow)" />

  <!-- Shackle (Lock Arch) -->
  <path d="M195,220 L195,175 C195,145 220,120 250,120 C280,120 305,145 305,175 L305,220" fill="none" stroke="#ef4444" stroke-width="12" stroke-linecap="round" />
  <path d="M195,220 L195,175 C195,145 220,120 250,120 C280,120 305,145 305,175 L305,220" fill="none" stroke="#fecaca" stroke-width="3" stroke-linecap="round" opacity="0.5" />

  <!-- Lock Body -->
  <g filter="url(#shieldShadow)">
    <rect x="175" y="210" width="150" height="110" rx="20" fill="url(#lockGrad)" stroke="#ef4444" stroke-width="3" />
  </g>

  <!-- Lock Detail (Keyhole) -->
  <circle cx="250" cy="255" r="10" fill="#11101b" />
  <path d="M246,255 L254,255 L257,285 L243,285 Z" fill="#11101b" />

  <!-- Warning indicator (Exclamation Mark) -->
  <g style="transform: translate(20px, 30px);" filter="url(#lockGlow)">
    <circle cx="370" cy="180" r="18" fill="#f59e0b" />
    <rect x="367" y="168" width="6" height="12" rx="3" fill="#ffffff" />
    <circle cx="370" cy="188" r="3" fill="#ffffff" />
  </g>
</svg>
