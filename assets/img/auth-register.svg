<svg width="400" height="400" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGlowReg" x1="250" y1="50" x2="250" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="250" y1="420" x2="250" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#0f766e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="220" y1="90" x2="280" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="portalGrad" x1="250" y1="60" x2="250" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    
    <!-- Shadows & Glows -->
    <filter id="dropShadowReg" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0d9488" flood-opacity="0.25"/>
    </filter>
    <filter id="starGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient Glow -->
  <circle cx="250" cy="250" r="190" fill="url(#bgGlowReg)"/>

  <!-- Glowing Winding Path to Success -->
  <path d="M250,420 C180,390 150,330 250,300 C350,270 320,200 250,180" fill="none" stroke="url(#pathGrad)" stroke-width="40" stroke-linecap="round" opacity="0.8"/>
  <path d="M250,420 C180,390 150,330 250,300 C350,270 320,200 250,180" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 15"/>

  <!-- Achievement Portal at the end of the path -->
  <g filter="url(#dropShadowReg)">
    <circle cx="250" cy="120" r="45" fill="url(#portalGrad)" stroke="#2dd4bf" stroke-width="3" />
    <!-- Graduation / Trophy Icon in Portal -->
    <path d="M230,110 L270,110 L270,130 C270,140 250,145 250,145 C250,145 230,140 230,130 Z" fill="#ffffff" />
    <path d="M225,103 L250,92 L275,103 L250,114 Z" fill="#ffffff" />
    <path d="M250,145 L250,152 M240,152 L260,152" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Floating Achievement Stars -->
  <g filter="url(#starGlow)">
    <polygon points="250,45 253,55 264,55 255,61 258,72 250,65 242,72 245,61 236,55 247,55" fill="url(#starGrad)"/>
    <polygon points="120,160 122,168 131,168 124,173 126,181 120,176 114,181 116,173 109,168 118,168" fill="url(#starGrad)" opacity="0.8"/>
    <polygon points="380,180 382,188 391,188 384,193 386,201 380,196 374,201 376,193 369,188 378,188" fill="url(#starGrad)" opacity="0.8"/>
  </g>

  <!-- Floating Book/Knowledge Icon -->
  <g filter="url(#dropShadowReg)" style="transform: translate(-30px, 60px);">
    <rect x="120" y="220" width="55" height="45" rx="6" fill="#115e59" stroke="#5eead4" stroke-width="2" />
    <path d="M128,230 L167,230 M128,240 L157,240 M128,250 L147,250" stroke="#99f6e4" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Floating Code Icon -->
  <g filter="url(#dropShadowReg)" style="transform: translate(40px, 80px);">
    <circle cx="340" cy="270" r="28" fill="#134e4a" stroke="#2dd4bf" stroke-width="2" />
    <!-- Code brackets symbol < /> -->
    <path d="M330,264 L322,270 L330,276 M350,264 L358,270 L350,276 M343,262 L337,278" fill="none" stroke="#2dd4bf" stroke-width="2.5" stroke-linecap="round" />
  </g>
</svg>
