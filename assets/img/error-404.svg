<svg width="200" height="200" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGlow404" x1="250" y1="50" x2="250" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#312e81" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="planetGrad" x1="160" y1="160" x2="340" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="100" y1="230" x2="400" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#c7d2fe" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.1"/>
    </linearGradient>
    
    <!-- Shadows & Glows -->
    <filter id="planetShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#4f46e5" flood-opacity="0.3"/>
    </filter>
    <filter id="elementGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient blue/purple glow -->
  <circle cx="250" cy="250" r="180" fill="url(#bgGlow404)"/>

  <!-- Starry Constellation Nodes -->
  <g stroke="#4f46e5" stroke-width="1.5" opacity="0.4">
    <line x1="80" y1="120" x2="160" y2="90" />
    <line x1="160" y1="90" x2="220" y2="150" />
    <line x1="380" y1="120" x2="420" y2="200" />
    <line x1="420" y1="200" x2="350" y2="230" />
    <line x1="120" y1="360" x2="180" y2="400" />
    <line x1="180" y1="400" x2="260" y2="380" />
  </g>
  <g fill="#818cf8" opacity="0.7">
    <circle cx="80" cy="120" r="4" />
    <circle cx="160" cy="90" r="5" />
    <circle cx="220" cy="150" r="3" />
    <circle cx="380" cy="120" r="5" />
    <circle cx="420" cy="200" r="4" />
    <circle cx="120" cy="360" r="4" filter="url(#elementGlow)" />
    <circle cx="180" cy="400" r="3" />
    <circle cx="260" cy="380" r="5" />
  </g>

  <!-- Planet Ring (behind planet) -->
  <path d="M110,265 C130,235 370,235 390,265" fill="none" stroke="url(#ringGrad)" stroke-width="16" stroke-linecap="round" opacity="0.5"/>

  <!-- Lost Planet (representing 404) -->
  <g filter="url(#planetShadow)">
    <circle cx="250" cy="250" r="90" fill="url(#planetGrad)" stroke="#4f46e5" stroke-width="4"/>
  </g>

  <!-- Planet details / craters -->
  <circle cx="200" cy="210" r="14" fill="#312e81" opacity="0.3"/>
  <circle cx="290" cy="280" r="18" fill="#312e81" opacity="0.3"/>
  <circle cx="280" cy="190" r="10" fill="#312e81" opacity="0.3"/>
  <circle cx="180" cy="270" r="12" fill="#312e81" opacity="0.3"/>

  <!-- Planet Ring (in front of planet) -->
  <path d="M110,265 C130,295 370,295 390,265" fill="none" stroke="url(#ringGrad)" stroke-width="16" stroke-linecap="round"/>

  <!-- Lost/Floating Astronaut / Satellite -->
  <g filter="url(#planetShadow)" style="transform: translate(-10px, -20px);">
    <rect x="330" y="100" width="45" height="40" rx="10" fill="#ffffff" />
    <rect x="338" y="108" width="29" height="18" rx="4" fill="#1e1b4b" stroke="#818cf8" stroke-width="2" />
    <!-- Oxygen pack -->
    <rect x="322" y="105" width="10" height="30" rx="3" fill="#cbd5e1" />
    <!-- Tether wire -->
    <path d="M322,120 C290,110 270,140 250,160" fill="none" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round" stroke-dasharray="4 6"/>
  </g>
</svg>
