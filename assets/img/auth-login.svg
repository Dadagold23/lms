<svg width="400" height="400" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGlow" x1="250" y1="70" x2="250" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="laptopBody" x1="120" y1="160" x2="380" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="120" y1="90" x2="380" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="330" y1="260" x2="430" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#4f46e5" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Ambient Glow -->
  <circle cx="250" cy="250" r="180" fill="url(#bgGlow)"/>
  
  <!-- Floating Dashboard Workspace -->
  <g filter="url(#dropShadow)">
    <!-- Laptop Chassis -->
    <rect x="120" y="160" width="260" height="190" rx="16" fill="url(#laptopBody)" stroke="#6366f1" stroke-width="4"/>
    <!-- Screen Bezel -->
    <rect x="135" y="175" width="230" height="150" rx="8" fill="#020617"/>
    <!-- Screen Content Display -->
    <rect x="142" y="182" width="216" height="136" rx="4" fill="#0b0f19"/>
    
    <!-- Code Editor Blocks (mockup UI) -->
    <circle cx="155" cy="195" r="5" fill="#ef4444" />
    <circle cx="170" cy="195" r="5" fill="#eab308" />
    <circle cx="185" cy="195" r="5" fill="#22c55e" />
    
    <!-- Sidebar navigation mock -->
    <rect x="155" y="215" width="30" height="85" rx="3" fill="#1e293b" opacity="0.6"/>
    <!-- Main content text block mock -->
    <rect x="195" y="215" width="120" height="12" rx="4" fill="#6366f1" opacity="0.9"/>
    <rect x="195" y="235" width="150" height="8" rx="3" fill="#475569" opacity="0.7"/>
    <rect x="195" y="250" width="130" height="8" rx="3" fill="#475569" opacity="0.7"/>
    <rect x="195" y="265" width="90" height="8" rx="3" fill="#475569" opacity="0.7"/>
    <rect x="195" y="280" width="110" height="8" rx="3" fill="#475569" opacity="0.7"/>
    
    <!-- Keyboard/Base connection link -->
    <path d="M220,350 L280,350 L290,362 L210,362 Z" fill="#334155" />
    <!-- Laptop Base -->
    <rect x="90" y="360" width="320" height="10" rx="5" fill="#475569" />
    <rect x="220" y="360" width="60" height="4" rx="2" fill="#1e293b" />
  </g>

  <!-- Graduation Cap (Higher Education Theme) -->
  <g filter="url(#dropShadow)" style="transform: translate(0px, -15px);">
    <path d="M250,75 L380,125 L250,175 L120,125 Z" fill="url(#capGrad)"/>
    <path d="M190,150 L190,205 C190,220 310,220 310,205 L310,150" fill="none" stroke="#4f46e5" stroke-width="6" stroke-linecap="round" />
    <path d="M340,140 L340,225 C340,230 330,235 330,235" fill="none" stroke="#f59e0b" stroke-width="3" />
    <circle cx="330" cy="235" r="5" fill="#f59e0b" />
  </g>

  <!-- Floating Analytics Badge -->
  <g filter="url(#dropShadow)" style="transform: translate(15px, 20px);">
    <rect x="330" y="260" width="90" height="80" rx="16" fill="url(#cardGrad)" stroke="#0ea5e9" stroke-width="2" />
    <!-- Mini graph lines -->
    <path d="M350,315 L370,295 L390,305 L410,280" fill="none" stroke="#e0f2fe" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="410" cy="280" r="4.5" fill="#ffffff" filter="url(#glow)" />
  </g>

  <!-- Floating Palette/Design Badge -->
  <g filter="url(#dropShadow)" style="transform: translate(-10px, 15px);">
    <circle cx="100" cy="270" r="45" fill="#3b0764" stroke="#a855f7" stroke-width="2" />
    <circle cx="85" cy="255" r="9" fill="#db2777" />
    <circle cx="115" cy="255" r="9" fill="#2563eb" />
    <circle cx="85" cy="285" r="9" fill="#ca8a04" />
    <circle cx="115" cy="285" r="9" fill="#16a34a" />
  </g>
</svg>
